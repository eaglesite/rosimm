<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffebf0 0%, #ffe4ec 20%, #ffd4e0 40%, #ffc8d4 60%, #ffe8ec 80%, #fff5f7 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        .logo p {
            color: #aaa;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 14px;
            color: #aaa;
            margin-bottom: 8px;
        }
        input {
            width: 100%;
            padding: 15px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s ease;
        }
        input:focus {
            border-color: #00d2ff;
        }
        input::placeholder {
            color: #666;
        }
        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            color: white;
        }
        .btn:hover:not(:disabled) {
            transform: scale(1.02);
            box-shadow: 0 5px 20px rgba(0, 210, 255, 0.4);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .error-message {
            background: rgba(235, 51, 73, 0.2);
            border: 1px solid rgba(235, 51, 73, 0.5);
            color: #eb3349;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 15px;
            display: none;
            text-align: center;
        }
        .loading-indicator {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .hint {
            text-align: center;
            color: #666;
            font-size: 12px;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>🔒</h1>
            <p>管理后台登录</p>
        </div>
        
        <div class="error-message" id="errorMessage"></div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="password">管理员密码</label>
                <input type="password" id="password" name="password" placeholder="请输入管理员密码" required>
            </div>
            
            <button type="submit" class="btn" id="loginBtn">
                <span id="btnText">登 录</span>
            </button>
        </form>
        
        <div class="hint">
            
        </div>
    </div>

    <script>
        var loginForm = document.getElementById('loginForm');
        var loginBtn = document.getElementById('loginBtn');
        var btnText = document.getElementById('btnText');
        var errorMessage = document.getElementById('errorMessage');

        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            var password = document.getElementById('password').value;
            if (!password.trim()) {
                showError('请输入密码');
                return;
            }

            loginBtn.disabled = true;
            btnText.innerHTML = '<span class="loading-indicator"></span>登录中...';
            errorMessage.style.display = 'none';

            try {
                const response = await fetch('/api/login/admin', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: `password=${encodeURIComponent(password)}`
                });

                const data = await response.json();

                if (data.success) {
                    window.location.href = '/admin';
                } else {
                    showError(data.message);
                }
            } catch (error) {
                showError('登录失败，请重试');
            } finally {
                loginBtn.disabled = false;
                btnText.innerHTML = '登 录';
            }
        });

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
        }
    </script>
</body>
</html>
